name: pub_dev_packages_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_bloc: ^9.1.1
  flutter_localization: ^0.3.3
  equatable: ^2.0.8
  flutter_local_notifications: ^20.1.0
  workmanager: ^0.9.0+3
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  pub_api_client: ^3.2.0
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.11.1
  go_router: ^17.1.0
  flutter_screenutil: ^5.9.3
  device_preview_plus: ^2.6.0
  visibility_detector: ^0.4.0+2
  bloc_concurrency: ^0.3.0
  talker_bloc_logger: ^5.1.14
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  retry: ^3.1.2
  talker: ^5.1.14
  injectable_generator: ^2.12.0
  html: ^0.15.6
  flutter_markdown_plus: ^1.0.7
  flutter_highlighter: ^0.1.1
  dio: ^5.9.1
  youtube_explode_dart: ^3.0.5
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/core/assets_gen

  integrations:
    image: true
    flutter_svg: true
    lottie: false

  colors:
    inputs:
      - assets/colors/colors.xml

flutter_intl:
  enabled: true
  class_name: AppLocalizations
  main_locale: en
  arb_dir: lib/core/l10n
  output_dir: lib/core/l10n/generated
  use_deferred_loading: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
